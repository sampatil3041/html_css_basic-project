<!DOCTYPE html>
<html>
<head>
    <title>Simple Card</title>

    <style>
        body{
            margin:0;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#111;
            font-family:Arial;
        }

        .card{
            width:300px;
            padding:30px;
            text-align:center;
            background:#1e1e1e;
            border-radius:15px;
            color:white;
            box-shadow:0 0 20px #00ffff;
        }

        h1{
            margin-bottom:10px;
        }

        p{
            color:#cfcfcf;
            font-size:14px;
        }

        button{
            margin-top:20px;
            padding:10px 20px;
            border:none;
            border-radius:25px;
            background:#00ffff;
            color:black;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:white;
        }
    </style>
</head>

<body>

    <div class="card">
        <h1>Hello World</h1>
        <p>This is a simple project using HTML and CSS.</p>
        <button>Explore</button>
    </div>

</body>
</html>
